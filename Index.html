<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>URL Lengthener Tool</title>

<style>
  :root {
    --bg: #f3f4f6;
    --card: #ffffff;
    --text: #111827;
    --border: #e5e7eb;
    --primary: #2563eb;
    --success: #16a34a;
  }

  [data-theme="dark"] {
    --bg: #0f172a;
    --card: #111827;
    --text: #f9fafb;
    --border: #1f2937;
    --primary: #3b82f6;
    --success: #22c55e;
  }

  body {
    margin: 0;
    padding: 40px 16px;
    font-family: system-ui, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    transition: 0.2s ease;
  }

  .container { width: 100%; max-width: 720px; }

  h1 { text-align: center; }

  .topbar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 10px;
  }

  .toggle {
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    cursor: pointer;
    color: var(--text);
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  label {
    font-weight: 600;
    display: block;
    margin-top: 10px;
    margin-bottom: 6px;
  }

  input, select {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  .primary { background: var(--primary); color: white; }
  .copy { background: var(--success); color: white; margin-top: 8px; }

  .box {
    margin-top: 8px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(127,127,127,0.08);
    word-break: break-all;
    font-size: 13px;
  }

  .status {
    font-size: 12px;
    margin-top: 5px;
    min-height: 16px;
    opacity: 0.9;
  }

  .section { margin-top: 18px; }
</style>
</head>

<body>
<div class="container">

  <div class="topbar">
    <button class="toggle" id="themeToggle">Toggle Theme</button>
  </div>

  <h1>URL Lengthener Tool</h1>

  <div class="card">

    <label>Enter URL</label>
    <input id="urlInput" placeholder="https://example.com/page" />

    <label>Extension Mode</label>
    <select id="modeSelect">
      <option value="utm">UTM Spam Mode</option>
      <option value="path">Path Explosion Mode</option>
      <option value="query">Query Bloat Mode</option>
      <option value="corporate">Corporate Tracking Mode</option>
      <option value="chaos">Chaos Mode (May Not Work)</option>
    </select>

    <button class="primary" id="generateBtn">Generate Long URL</button>

    <div class="section">
      <strong>Real URL</strong>
      <div class="box" id="realUrl"></div>
      <div class="status" id="realCount"></div>
      <button class="copy" data-copy="realUrl">Copy Real URL</button>
      <div class="status" id="realStatus"></div>
    </div>

    <div class="section">
      <strong>Long URL</strong>
      <div class="box" id="longUrl"></div>
      <div class="status" id="longCount"></div>
      <button class="copy" data-copy="longUrl">Copy Long URL</button>
      <div class="status" id="longStatus"></div>
    </div>

  </div>
</div>

<script>
const root = document.documentElement;
const input = document.getElementById("urlInput");
const mode = document.getElementById("modeSelect");

const themeToggle = document.getElementById("themeToggle");

// theme
const saved = localStorage.getItem("theme");
if (saved) root.setAttribute("data-theme", saved);

themeToggle.onclick = () => {
  const dark = root.getAttribute("data-theme") === "dark";
  if (dark) {
    root.removeAttribute("data-theme");
    localStorage.setItem("theme", "light");
  } else {
    root.setAttribute("data-theme", "dark");
    localStorage.setItem("theme", "dark");
  }
};

function normalizeUrl(v) {
  if (!v) throw new Error();
  return v.startsWith("http") ? v : "https://" + v;
}

function updateCounts(real, long) {
  document.getElementById("realCount").textContent =
    `Characters: ${real.length}`;

  const diff = long.length - real.length;
  document.getElementById("longCount").textContent =
    `Characters: ${long.length} (+${diff})`;
}

function generateUrl() {
  try {
    const base = new URL(normalizeUrl(input.value.trim()));
    const m = mode.value;

    const real = base.toString();
    const url = new URL(real);

    const r = () => Math.random().toString(36).slice(2, 8);
    const rep = (w,n)=>Array(n).fill(w).join("-");

    if (m === "utm" || m === "chaos") {
      url.searchParams.set("utm_source", "tool");
      url.searchParams.set("utm_campaign", "ultra_" + r());
    }

    if (m === "query" || m === "chaos") {
      for (let i=0;i<6;i++)
        url.searchParams.set("q"+i, rep("param",3)+"_"+r());
    }

    if (m === "path" || m === "chaos") {
      const depth = 8;
      url.pathname += "/" + Array.from({length:depth},
        ()=>"section-"+r()).join("/");
    }

    if (m === "corporate" || m === "chaos") {
      url.searchParams.set("session", crypto.randomUUID());
      url.hash = "report/" + rep("insight",5) + "-" + r();
    }

    const long = url.toString();

    document.getElementById("realUrl").textContent = real;
    document.getElementById("longUrl").textContent = long;

    updateCounts(real, long);

    document.getElementById("realStatus").textContent = "";
    document.getElementById("longStatus").textContent = "";

  } catch {
    document.getElementById("realStatus").textContent = "Invalid URL";
  }
}

document.getElementById("generateBtn").onclick = generateUrl;

document.querySelectorAll(".copy").forEach(btn=>{
  btn.onclick = async () => {
    const text = document.getElementById(btn.dataset.copy).textContent;
    await navigator.clipboard.writeText(text);
    btn.nextElementSibling.textContent = "Copied!";
    setTimeout(()=>btn.nextElementSibling.textContent="",1200);
  };
});
</script>

</body>
</html>
